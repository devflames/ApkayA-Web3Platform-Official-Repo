version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apkaya
      POSTGRES_PASSWORD: apkaya
      POSTGRES_DB: engine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apkaya -d engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine-api:
    build: ./apps/engine
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://apkaya:apkaya@postgres:5432/engine
      PORT: "3005"
    command: ["node", "dist/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3005/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  engine-worker:
    build: ./apps/engine
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://apkaya:apkaya@postgres:5432/engine
    command: ["node", "dist/workers/txWorker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      engine-api:
        condition: service_healthy

  engine-webhook-worker:
    build: ./apps/engine
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://apkaya:apkaya@postgres:5432/engine
    command: ["node", "dist/workers/webhookWorker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      engine-api:
        condition: service_healthy
    profiles:
      - webhooks

  insight-api:
    build:
      context: .
      dockerfile: apps/insight/Dockerfile
    ports:
      - "3006:3006"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://apkaya:apkaya@postgres:5432/engine
      PORT: "3006"
    command: ["node", "dist/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3006/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  insight-worker:
    build:
      context: .
      dockerfile: apps/insight/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://apkaya:apkaya@postgres:5432/engine
    command: ["node", "dist/workers/indexerWorker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      insight-api:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        VITE_ENGINE_URL: http://localhost:3005
        VITE_INSIGHT_URL: http://localhost:3006
        VITE_DEFAULT_API_KEY: ${ENGINE_ACCESS_KEYS:-dev-secret-key-change-me}
    ports:
      - "5173:80"
    depends_on:
      engine-api:
        condition: service_healthy
      insight-api:
        condition: service_healthy

volumes:
  postgres-data:
